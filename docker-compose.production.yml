services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file: ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_buffers=64MB -c work_mem=2MB
      -c maintenance_work_mem=32MB -c max_connections=30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DJANGO_DEBUG: "false"
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "poetry run python manage.py migrate --noinput &&
      poetry run python manage.py collectstatic --noinput &&
      poetry run gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 1 --threads 2 --access-logfile - --error-logfile -"

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"

volumes:
  postgres_data:
