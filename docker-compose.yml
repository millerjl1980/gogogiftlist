services:
  db:
    image: postgres:15
    container_name: webapp_db
    volumes:
      - ./data/db:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: webapp_backend_sandbox
    volumes:
      - ./backend:/app
      - /app/.venv              # Keeps container's Python virtualenv intact
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "poetry run python manage.py migrate --noinput &&
      poetry run python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: webapp_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules       # Keeps container's Bun node_modules intact
    ports:
      - "3000:3000"
    env_file:
      - .env
    command: bun run dev --host 0.0.0.0 --port 3000
    depends_on:
      - backend
